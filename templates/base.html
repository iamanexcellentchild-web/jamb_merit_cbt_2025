<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Merit CBT{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green:     #1a7a4a;
            --green-lt:  #e8f5ee;
            --green-mid: #2e9e61;
            --red:       #c0392b;
            --red-lt:    #fdf0ee;
            --gold:      #d4a017;
            --gold-lt:   #fdf6e3;
            --navy:      #0f2744;
            --navy-mid:  #1a3a5c;
            --slate:     #4a5568;
            --border:    #dde3ea;
            --bg:        #f4f6f9;
            --white:     #ffffff;
            --radius:    8px;
            --shadow:    0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: #1a2332;
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── Navbar ── */
        .navbar {
            background: var(--navy);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .navbar-brand {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .navbar-brand span { color: var(--gold); }
        .navbar-links { display: flex; gap: 0.25rem; align-items: center; }
        .navbar-links a {
            color: #b0bec5;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius);
            transition: background 0.15s, color 0.15s;
        }
        .navbar-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ── Flash messages ── */
        .flash-box { max-width: 860px; margin: 1rem auto 0; padding: 0 1.5rem; }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            background: var(--gold-lt);
            border-left: 4px solid var(--gold);
            color: #5c4a00;
        }

        /* ── Container ── */
        .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* ── Generic card ── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 2rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.4rem;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: filter 0.15s, transform 0.1s;
        }
        .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary   { background: var(--green); color: #fff; }
        .btn-secondary { background: var(--navy);  color: #fff; }
        .btn-danger    { background: var(--red);   color: #fff; }
        .btn-outline   { background: transparent; border: 2px solid var(--border); color: var(--slate); }
        .btn-outline:hover { border-color: var(--green); color: var(--green); filter: none; }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="{{ url_for('index') }}">🎓 <span>Merit</span> CBT</a>
    <div class="navbar-links">
        {% if session.get('username') %}
            <a href="{{ url_for('history') }}">My History</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
        {% endif %}
    </div>
</nav>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-box">
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}
</body>
</html>
