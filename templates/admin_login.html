<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merit CBT — Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .icon { font-size: 48px; margin-bottom: 14px; display: block; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    p.sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 30px; }

    .flash {
      background: rgba(255,80,80,0.2);
      border: 1px solid rgba(255,80,80,0.45);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.87rem;
      margin-bottom: 18px;
      color: #ffbbbb;
    }

    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      font-size: 1rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus { border-color: #e040fb; }

    button {
      width: 100%;
      padding: 13px;
      font-size: 0.97rem;
      font-weight: 600;
      background: linear-gradient(90deg, #e040fb, #7b1fa2);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.88; }

    .back {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
    }
    .back:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🛡️</span>
    <h1>Admin Panel</h1>
    <p class="sub">Enter your admin password to continue</p>

    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        {% for m in msgs %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <input type="password" name="password" placeholder="Admin password" autofocus required />
      <button type="submit">Sign In &rarr;</button>
    </form>

    <a class="back" href="{{ url_for('access') }}">&larr; Back to app</a>
  </div>
</body>
</html>
